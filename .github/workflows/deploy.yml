name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker europe-north1-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          docker build -t europe-north1-docker.pkg.dev/fluid-terminal-493409-p5/cloud-run-source-deploy/hello .
          docker push europe-north1-docker.pkg.dev/fluid-terminal-493409-p5/cloud-run-source-deploy/hello

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy hello \
            --image europe-north1-docker.pkg.dev/fluid-terminal-493409-p5/cloud-run-source-deploy/hello \
            --region europe-north1 \
            --allow-unauthenticated
